// 중복 제거 (영화명 기준)
const seen = new Set();
const pts = rawPts.filter(d=>{ const k=d.movie; if(seen.has(k)) return false; seen.add(k); return true; });

const slope=1.1517, intercept=1.7792;
const dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = dark?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.06)';
const tickColor = dark?'#888780':'#888780';
const labelColor = dark?'#B4B2A9':'#5F5E5A';

const normalPts = pts.filter(d=>!d.hl).map(d=>({x:d.lx,y:d.ly,movie:d.movie,xO:d.x,yO:d.y}));
const hlPts    = pts.filter(d=> d.hl).map(d=>({x:d.lx,y:d.ly,movie:d.movie,xO:d.x,yO:d.y}));
const xMin=1.2, xMax=4.8;
const regLine=[{x:xMin,y:slope*xMin+intercept},{x:xMax,y:slope*xMax+intercept}];

function fmt(v){const o=Math.pow(10,v);return o>=1000000?(o/1000000).toFixed(1)+'M':o>=1000?Math.round(o/1000)+'K':Math.round(o)+'';}

new Chart(document.getElementById('mainChart'),{
  data:{datasets:[
    {type:'scatter',label:'일반 영화',data:normalPts,

  ]},
