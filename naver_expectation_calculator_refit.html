<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 관객수 예측 계산기 (파이썬 모델 동기화)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .calculator-card {
            background: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-top: 0;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
            font-size: 22px;
        }
        .formula {
            background: #fdf2f2;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #c0392b;
            margin-bottom: 20px;
            word-break: break-all;
            line-height: 1.5;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            border-color: #e74c3c;
            outline: none;
        }
        button {
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #c0392b;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 5px solid #e67e22;
            border-radius: 4px;
            display: none;
        }
        .result-title {
            font-size: 15px;
            color: #666;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 28px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 15px;
        }
        .range-box {
            font-size: 14px;
            color: #7f8c8d;
            border-top: 1px dashed #ddd;
            padding-top: 10px;
            line-height: 1.6;
        }
        .range-val {
            font-weight: bold;
            color: #2980b9;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>🎬 흥행 관객수 예측 계산기</h2>
    <div class="formula">
        <strong>동기화된 분석 수식:</strong><br>
        ln(최종관객수) = 3.492492 + 1.232954 × ln(개봉주기대지수)
    </div>

    <div class="input-group">
        <label for="expectIndex">개봉주 기대지수 입력</label>
        <input type="number" id="expectIndex" placeholder="예: 9601" min="1" required>
    </div>

    <button onclick="calculateMetrics()">예측 관객수 계산하기</button>

    <div class="result-box" id="resultBox">
        <div class="result-title">🎯 파이썬 모델 예측 관객수</div>
        <div class="result-value" id="predValue">0 명</div>
        
        <div class="range-box">
            📢 <strong>95% 비대칭 예측구간 (리스크 관리용)</strong><br>
            • 최악의 경우 (하한선): <span class="range-val" id="lowValue">0 명</span><br>
            • 입소문 대박 (상한선): <span class="range-val" id="highValue">0 명</span>
        </div>
    </div>
</div>

<script>
    function calculateMetrics() {
        const idx = parseFloat(document.getElementById('expectIndex').value);
        if (!idx || idx <= 0) {
            alert('올바른 기대지수를 입력해주세요.');
            return;
        }

        // 1. 파이썬 실제 계수 입력
        const b0 = 3.492492;
        const b1 = 1.232954;

        // 2. 파이썬과 동일한 정석 연산 (ln 변환 후 수식 대입)
        const lnIdx = Math.log(idx);
        const lnPred = b0 + (b1 * lnIdx);

        // 3. 자연수 복원 (exp)
        let finalAudience = Math.exp(lnPred);

        // 4. 95% 예측구간 계산 (오차승수 1.35배 적용)
        let lowerAudience = finalAudience / 1.35;
        let upperAudience = finalAudience * 1.35;

        // 결과 화면에 반영 (반올림 후 콤마 추가)
        document.getElementById('predValue').innerText = Math.round(finalAudience).toLocaleString() + ' 명';
        document.getElementById('lowValue').innerText = Math.round(lowerAudience).toLocaleString() + ' 명';
        document.getElementById('highValue').innerText = Math.round(upperAudience).toLocaleString() + ' 명';

        // 결과 박스 노출
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
