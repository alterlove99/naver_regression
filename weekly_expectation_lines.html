const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
const tickColor = isDark ? '#888780' : '#888780';
const labelColor = isDark ? '#B4B2A9' : '#5F5E5A';

// 차트 글로벌 폰트 패밀리 기본값 설정 (Noto Sans KR 적용)
Chart.defaults.font.family = "'Noto Sans KR', sans-serif";

function getColor(audience, alpha) {
  if(audience >= 1000000) return `rgba(83,74,183,${alpha})`;
  if(audience >= 100000)  return `rgba(29,158,117,${alpha})`;
  return `rgba(136,135,128,${alpha})`;
}

let chart = null;

function buildDatasets(filter) {
  return raw
    .filter(d => {
      if(filter==='high') return d.audience >= 1000000;
      if(filter==='mid')  return d.audience >= 100000 && d.audience < 1000000;
      if(filter==='low')  return d.audience < 100000;
      return true;
    })
    .map(d => ({
      label: d.movie,
      data: d.values,
      borderColor: getColor(d.audience, filter==='all' ? 0.45 : 0.7),
      backgroundColor: 'transparent',
      borderWidth: filter==='all' ? 1 : 1.5,
      pointRadius: 2,
      pointHoverRadius: 5,
      tension: 0.3,
      audience: d.audience
    }));
}

function renderChart(filter) {
  const datasets = buildDatasets(filter);
  if(chart) { chart.destroy(); }
  chart = new Chart(document.getElementById('lineChart'), {
    type: 'line',
    data: {
      labels: ['D-4주','D-3주','D-2주','D-1주','개봉주'],
      datasets
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      animation: { duration: 300 },
      plugins: {
        legend: { display: false },
        tooltip: {
          mode: 'nearest',
          intersect: true,
          // 툴팁 내부 폰트 스타일 제어
          titleFont: { size: 13, weight: '700' },
          bodyFont: { size: 12 },
          callbacks: {
            title: items => items[0].dataset.label,
            label: item => {
              const a = item.dataset.audience;
              return [`기대지수: ${item.raw.toLocaleString()}`, `최종 관객수: ${a.toLocaleString()}명`];
            }
          }
        }
      },
      scales: {
        x: {
          title: { display: true, text: '개봉 전후 시점', font:{size:12, weight:'500'}, color:labelColor },
          ticks: { color:tickColor, font:{size:12} },
          grid: { color:gridColor }
        },
        y: {
          title: { display: true, text: '기대지수', font:{size:12, weight:'500'}, color:labelColor },
          ticks: {
            color:tickColor, font:{size:11},
            callback: v => v >= 1000 ? Math.round(v/1000)+'K' : v
          },
          grid: { color:gridColor }
        }
      }
    }
  });
}

function setFilter(f) {
  ['all','high','mid','low'].forEach(id => {
    const btn = document.getElementById('f-'+id);
    btn.style.background = 'transparent';
    btn.style.color = 'var(--color-text-primary)';
  });
  document.getElementById('f-'+f).style.background = 'var(--color-background-secondary, #eee)';
  renderChart(f);
}

renderChart('all');
setFilter('all');
