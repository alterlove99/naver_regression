const isDark = matchMedia('(prefers-color-scheme: dark)').matches;
const normalColor = isDark ? 'rgba(127,119,221,0.45)' : 'rgba(83,74,183,0.35)';
const normalBorder = isDark ? '#7F77DD' : '#534AB7';
const hlColor = isDark ? 'rgba(216,90,48,0.88)' : 'rgba(216,90,48,0.9)';
const hlBorder = isDark ? '#F0997B' : '#993C1D';
const lineColor = '#1D9E75';
const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.06)';
const tickColor = isDark ? '#888780' : '#888780';
const labelColor = isDark ? '#B4B2A9' : '#5F5E5A';

const normalPts = all.filter(d => !d.hl).map(d => ({x:d.lx, y:d.ly, movie:d.movie}));
const hlPts     = all.filter(d =>  d.hl).map(d => ({x:d.lx, y:d.ly, movie:d.movie}));
const slope = 1.2347, intercept = 1.5552;
const xMin = 1.2, xMax = 4.8;
const regLine = [{x:xMin, y:slope*xMin+intercept},{x:xMax, y:slope*xMax+intercept}];

function origLabel(lv, isY) {
  const v = Math.pow(10, lv);
  if(isY) return v>=1000000 ? (v/1000000).toFixed(1)+'M' : v>=1000 ? Math.round(v/1000)+'K' : Math.round(v)+'';
  return v>=1000 ? Math.round(v/1000)+'K' : Math.round(v)+'';
}

let currentFilter = 'all';
function filterTable(f) {
  currentFilter = f;
  
  // 버튼 전체 스타일 리셋 및 활성화 스타일링 적용
  ['btnAll','btnHasY','btnNoY'].forEach(id => {
    const btn = document.getElementById(id);
    btn.style.background = 'transparent';
    btn.style.fontWeight = '400';
    btn.style.boxShadow = 'none';
  });
  
  const activeId = f==='all' ? 'btnAll' : f==='hasY' ? 'btnHasY' : 'btnNoY';
  const activeBtn = document.getElementById(activeId);
  activeBtn.style.background = 'var(--color-background-primary, #ffffff)';
  activeBtn.style.fontWeight = '500';
  activeBtn.style.boxShadow = '0 1px 3px rgba(0,0,0,0.06)';
  
  renderTable();
}

function renderTable() {
  const tbody = document.getElementById('excludedBody');
  const data = excluded.filter(d => {
    if(currentFilter==='hasY') return d.audience !== null;
    if(currentFilter==='noY') return d.audience === null;
    return true;
  });
  
  if (data.length === 0) {
    tbody.innerHTML = `<tr><td colspan="2" style="padding:24px;text-align:center;color:var(--color-text-tertiary);">조건에 맞는 영화가 없습니다.</td></tr>`;
    return;
  }

  tbody.innerHTML = data.map((d,i) => {
    const bg = i%2===0 ? '' : 'background:var(--color-background-secondary);';
    const audienceCell = d.audience !== null
      ? `<td style="padding:9px 12px;text-align:right;color:var(--color-text-primary); font-variant-numeric: tabular-nums;">${d.audience.toLocaleString()}명</td>`
      : `<td style="padding:9px 12px;text-align:right;"><span style="font-size:11px;padding:2px 6px;border-radius:4px;background:var(--color-background-tertiary);color:var(--color-text-tertiary);">데이터 없음</span></td>`;
    return `<tr style="${bg}border-bottom:0.5px solid var(--color-border-tertiary);">
      <td style="padding:9px 12px;color:var(--color-text-primary);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${d.name}</td>
      ${audienceCell}
    </tr>`;
  }).join('');
}

// 초기화 구문 호출 위치 수정
filterTable('all');
