<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>영화 관객수 예측 계산기 (상용로그 모델)</title>
    <style>
        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: #f4f6f9;
            margin: 0;
            padding: 40px 20px;
            display: flex;
            justify-content: center;
        }
        .calculator-card {
            background: #ffffff;
            max-width: 500px;
            width: 100%;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 {
            color: #333;
            margin-top: 0;
            border-bottom: 2px solid #e74c3c;
            padding-bottom: 10px;
            font-size: 22px;
        }
        .formula {
            background: #fdf2f2;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            color: #c0392b;
            margin-bottom: 20px;
            word-break: break-all;
            line-height: 1.5;
        }
        .input-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            font-weight: bold;
            color: #444;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            box-sizing: border-box;
            font-size: 16px;
        }
        input:focus {
            border-color: #e74c3c;
            outline: none;
        }
        button {
            width: 100%;
            background: #e74c3c;
            color: white;
            border: none;
            padding: 12px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s;
        }
        button:hover {
            background: #c0392b;
        }
        .result-box {
            margin-top: 25px;
            padding: 20px;
            background: #f9f9f9;
            border-left: 5px solid #e67e22;
            border-radius: 4px;
            display: none;
        }
        .result-title {
            font-size: 15px;
            color: #666;
            margin-bottom: 5px;
        }
        .result-value {
            font-size: 28px;
            font-weight: bold;
            color: #e67e22;
            margin-bottom: 15px;
        }
        .range-box {
            font-size: 14px;
            color: #7f8c8d;
            border-top: 1px dashed #ddd;
            padding-top: 10px;
            line-height: 1.6;
        }
        .range-val {
            font-weight: bold;
            color: #2980b9;
        }
    </style>
</head>
<body>

<div class="calculator-card">
    <h2>🎬 흥행 관객수 예측 계산기</h2>
    <div class="formula">
        <strong>업데이트된 분석 수식 (log₁₀):</strong><br>
        log₁₀(관객수) = 1.1517 × log₁₀(기대지수) + 1.7792<br>
        <span style="font-size:11px; color:#7f8c8d;">모델 오차범위 지표: RMSE = 0.443 (×2.78배)</span>
    </div>

    <div class="input-group">
        <label for="expectIndex">기대지수 입력</label>
        <input type="number" id="expectIndex" placeholder="예: 9601" min="1" required>
    </div>

    <button onclick="calculateMetrics()">예측 관객수 계산하기</button>

    <div class="result-box" id="resultBox">
        <div class="result-title">🎯 수식 기반 예측 관객수</div>
        <div class="result-value" id="predValue">0 명</div>
        
        <div class="range-box">
            📢 <strong>95% 비대칭 예측구간 (RMSE 반영)</strong><br>
            • 최악의 경우 (하한선): <span class="range-val" id="lowValue">0 명</span><br>
            • 입소문 대박 (상한선): <span class="range-val" id="highValue">0 명</span>
        </div>
    </div>
</div>

<script>
    function calculateMetrics() {
        const idx = parseFloat(document.getElementById('expectIndex').value);
        if (!idx || idx <= 0) {
            alert('올바른 기대지수를 입력해주세요.');
            return;
        }

        // 1. 상용로그(log10) 변환 후 수식 대입
        const logIdx = Math.log10(idx);
        const logPred = 1.7792 + (1.1517 * logIdx);

        // 2. 자연수 순수 복원 (10의 거듭제곱)
        let finalAudience = Math.pow(10, logPred);

        // 3. 제공된 RMSE 기반 정확한 오차 배율(2.78배) 적용
        const errorMultiplier = 2.78;
        let lowerAudience = finalAudience / errorMultiplier;
        let upperAudience = finalAudience * errorMultiplier;

        // 결과 화면에 반영 (반올림 후 콤마 추가)
        document.getElementById('predValue').innerText = Math.round(finalAudience).toLocaleString() + ' 명';
        document.getElementById('lowValue').innerText = Math.round(lowerAudience).toLocaleString() + ' 명';
        document.getElementById('highValue').innerText = Math.round(upperAudience).toLocaleString() + ' 명';

        // 결과 박스 노출
        document.getElementById('resultBox').style.display = 'block';
    }
</script>

</body>
</html>
